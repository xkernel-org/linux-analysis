# Mutation specs for Phase B (locate-const-in-ir).
#
# Each [[mutation]] entry produces one <index>.input.txt by:
#   1. Building <source_file> with wllvm (origin .ll)
#   2. Applying <sed_pattern> to <definition_source_file>, rebuilding (mutated .ll)
#   3. Diffing the two .ll files; the changed instruction reveals the IR
#      occurrence of the perf-const

[[mutation]]
index = 1
source_file = "block/blk-core.c"
definition_source_file = "block/blk.h"
sed_pattern = "s|#define BLK_MAX_REQUEST_COUNT\\t32|#define BLK_MAX_REQUEST_COUNT\\t16|"

[[mutation]]
index = 2
source_file = "block/blk-mq.c"
definition_source_file = "block/blk.h"
sed_pattern = "s|#define BLK_MAX_REQUEST_COUNT\\t32|#define BLK_MAX_REQUEST_COUNT\\t16|"
